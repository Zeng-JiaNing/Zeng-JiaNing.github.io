<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>20年后的你</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --warm-orange: #f4a460;
      --milk-tea: #d4a574;
      --star-gold: #d4af37;
    }

    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      color: #e8e0d5;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(244, 164, 96, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .page {
      display: none;
      opacity: 0;
    }

    .page.active {
      display: block;
      animation: pageIn 0.4s ease forwards;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 首页 */
    .home-page { text-align: center; padding: 40px 20px; }

    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .home-content { position: relative; z-index: 1; }

    .sacred-symbol {
      font-size: 40px;
      margin-bottom: 20px;
      animation: symbolReveal 1s ease forwards;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
    }

    @keyframes symbolReveal {
      0% { opacity: 0; transform: scale(0.5) rotate(-90deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .home-title {
      font-size: 32px;
      font-weight: 300;
      color: #f5f0e8;
      margin-bottom: 12px;
      letter-spacing: 6px;
      animation: titleIn 0.8s ease forwards 0.3s;
      opacity: 0;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .home-subtitle {
      font-size: 14px;
      color: #b8a89a;
      letter-spacing: 3px;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease forwards 0.5s;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .home-divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--star-gold), transparent);
      margin: 0 auto 25px;
      animation: expandLine 0.8s ease forwards 0.6s;
      opacity: 0;
    }

    @keyframes expandLine {
      0% { width: 0; opacity: 0; }
      100% { width: 50px; opacity: 1; }
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 35px;
      animation: fadeIn 0.6s ease forwards 0.7s;
      opacity: 0;
    }

    .tag {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--star-gold);
      letter-spacing: 1px;
    }

    .social-proof {
      margin-bottom: 35px;
      animation: fadeIn 0.6s ease forwards 1s;
      opacity: 0;
    }

    .people-count {
      display: block;
      font-size: 13px;
      color: #ffb74d;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .recent-join {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
    }

    .password-section {
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease forwards 1.1s;
      opacity: 0;
    }

    .password-label {
      font-size: 12px;
      color: #9a8a7a;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .password-input {
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      display: block;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 20px;
      padding: 12px 20px;
      font-size: 14px;
      color: #f5f0e8;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: all 0.3s ease;
    }

    .password-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
    }

    .password-input:focus {
      border-color: var(--star-gold);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
    }

    .password-input.error {
      border-color: #e57373;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .password-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .enter-btn {
      position: relative;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(244, 164, 96, 0.2));
      color: #f5f0e8;
      border: 1px solid rgba(212, 175, 55, 0.4);
      padding: 16px 45px;
      font-size: 15px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      overflow: hidden;
      animation: fadeIn 0.6s ease forwards 0.9s;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.25), transparent);
      transition: left 0.5s ease;
    }

    .enter-btn:hover::before { left: 100%; }
    .enter-btn:hover {
      border-color: var(--star-gold);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.25);
    }
    .enter-btn:active { transform: scale(0.97); }

    .home-note {
      margin-top: 20px;
      font-size: 12px;
      color: #9a8a7a;
      letter-spacing: 1px;
      animation: fadeIn 0.6s ease forwards 1.1s;
      opacity: 0;
    }

    /* 答题页 */
    .quiz-page {
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--star-gold), var(--warm-orange));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-align: right;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .question-number {
      font-size: 12px;
      color: var(--star-gold);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .question-text {
      font-size: 20px;
      color: #f5f0e8;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 18px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      color: #c8c0b5;
      opacity: 1;
      transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s;
    }

    .option:hover {
      background: rgba(212, 175, 55, 0.15);
      border-color: rgba(212, 175, 55, 0.4);
      color: #f5f0e8;
      transform: translateX(4px);
    }

    .option.selected {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(244, 164, 96, 0.15));
      border-color: var(--star-gold);
      color: #f5f0e8;
      transform: scale(1.02);
    }

    .option.unselected {
      opacity: 0.25 !important;
      pointer-events: none;
    }

    /* 加载页 */
    .loading-page {
      text-align: center;
      padding: 40px 20px;
    }

    .loading-icon {
      font-size: 50px;
      margin-bottom: 25px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .loading-text {
      font-size: 15px;
      color: #b8a89a;
      margin-bottom: 25px;
      letter-spacing: 2px;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading-bar {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 0 auto 12px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--star-gold), var(--warm-orange));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .loading-percent {
      font-size: 22px;
      color: var(--star-gold);
      font-weight: 300;
    }

    .loading-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 25px;
      letter-spacing: 1px;
    }

    /* 报告页 */
    .result-page {
      padding: 25px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .result-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.35;
      filter: blur(2px) saturate(0.8);
      z-index: 0;
      transition: background-image 0.6s ease;
    }

    .result-page > *:not(.result-bg) {
      position: relative;
      z-index: 1;
    }

    .result-icon {
      font-size: 60px;
      margin-bottom: 18px;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.35));
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      60% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    .result-title {
      font-size: 24px;
      color: #f5f0e8;
      margin-bottom: 8px;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .result-subtitle {
      font-size: 13px;
      color: #8a7a6a;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .result-summary-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 20px 22px;
      margin: 0 auto 22px;
      max-width: 500px;
      text-align: left;
    }

    .result-summary {
      font-size: 15px;
      color: #f0ebe0;
      line-height: 1.8;
      letter-spacing: 1px;
      margin: 0;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 24px 20px;
      text-align: left;
      margin-bottom: 18px;
    }

    .result-section {
      margin-bottom: 20px;
    }

    .result-section:last-child { margin-bottom: 0; }

    .section-title {
      font-size: 14px;
      color: var(--star-gold);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .section-content {
      font-size: 13px;
      color: #9a8a7a;
      line-height: 1.8;
    }

    .result-footer {
      font-size: 12px;
      color: #6a5a4a;
      line-height: 1.7;
      margin-top: 18px;
      font-style: italic;
    }

    .retry-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 14px;
      color: #9a8a7a;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      margin-top: 25px;
    }

    .retry-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #f5f0e8;
    }

    .admin-entry {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.3s;
      z-index: 100;
      font-size: 16px;
    }

    .admin-entry:hover {
      opacity: 0.8;
      background: rgba(212, 175, 55, 0.2);
      border-color: rgba(212, 175, 55, 0.4);
    }

    /* ========== Admin 页面样式 ========== */
    .admin-page {
      padding: 25px 20px;
      max-height: 100vh;
      overflow-y: auto;
    }

    .admin-title {
      text-align: center;
      color: #f5f0e8;
      margin-bottom: 25px;
      letter-spacing: 3px;
    }

    .admin-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .admin-card-title {
      font-size: 12px;
      color: #8a7a6a;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      text-align: center;
    }

    .stats-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 12px 8px;
    }

    .stats-label {
      font-size: 11px;
      color: #8a7a6a;
      margin-bottom: 6px;
    }

    .stats-value {
      font-size: 22px;
      font-weight: 600;
    }

    .stats-total { color: #f5f0e8; }
    .stats-used { color: #f4a460; }
    .stats-remaining { color: var(--star-gold); }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 10px;
      padding: 8px 16px;
      color: #f5f0e8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--star-gold), var(--warm-orange));
      color: #1a1a2e;
      font-weight: 600;
      border: none;
    }

    .btn-danger {
      background: rgba(229, 115, 115, 0.15);
      border-color: rgba(229, 115, 115, 0.3);
      color: #e57373;
    }

    .btn-danger:hover {
      background: rgba(229, 115, 115, 0.25);
    }

    .btn-full {
      width: 100%;
    }

    .btn-half {
      flex: 1;
    }

    .admin-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px 15px;
      color: #f5f0e8;
      font-size: 14px;
      outline: none;
    }

    .admin-input:focus {
      border-color: var(--star-gold);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .password-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .password-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c8c0b5;
      cursor: pointer;
      transition: background 0.2s;
    }

    .password-item:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    .password-item.used {
      opacity: 0.5;
    }

    .password-item .status {
      font-size: 11px;
    }

    .password-item .status.used {
      color: #e57373;
    }

    .password-item .status.unused {
      color: var(--star-gold);
    }

    .empty-state {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      padding: 20px;
      font-size: 13px;
    }

    .admin-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 8px;
    }

    .back-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      color: #9a8a7a;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #f5f0e8;
    }
  </style>
</head>
<body>
  <!-- 管理员入口 -->
  <div class="admin-entry" onclick="enterAdmin()" title="管理员入口">🔒</div>

  <!-- 星星背景 -->
  <div class="star-field" id="starField"></div>

  <div class="container">
    <!-- 首页 -->
    <div class="page home-page active" id="homePage">
      <div class="home-content">
        <div class="sacred-symbol">✧</div>
        <h1 class="home-title">20年后的你</h1>
        <p class="home-subtitle">一份只属于你的人生推演报告</p>
        <div class="home-divider"></div>
        <div class="tags-container">
          <span class="tag">18道题</span>
          <span class="tag">4分钟</span>
          <span class="tag">千人千面</span>
          <span class="tag">专属推演</span>
        </div>
        <div class="social-proof">
          <span class="people-count">🔥 已有 <span id="peopleCount">12,853</span> 人参与</span>
          <span class="recent-join">3秒前有人刚刚完成</span>
        </div>
        <div class="password-section">
          <p class="password-label">🔐 请输入专属访问口令</p>
          <input type="text" class="password-input" id="passwordInput" placeholder="输入口令" maxlength="20" autocomplete="off">
          <p class="password-hint">每个口令仅限使用一次</p>
        </div>
        <button type="button" class="enter-btn" id="startBtn" onclick="startQuiz()">解锁人生剧本</button>
        <p class="home-note">✨ 准备好遇见未来的自己了吗？</p>
      </div>
    </div>

    <!-- 答题页 -->
    <div class="page quiz-page" id="quizPage">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text"><span id="currentQuestion">1</span> / 18</p>
      <p class="question-number">Q<span id="questionNum">1</span></p>
      <p class="question-text" id="questionText"></p>
      <div class="options" id="optionsContainer"></div>
    </div>

    <!-- 加载页 -->
    <div class="page loading-page" id="loadingPage">
      <div class="loading-icon">✧</div>
      <p class="loading-text" id="loadingText">正在连接命运之线...</p>
      <div class="loading-bar">
        <div class="loading-progress" id="loadingProgress"></div>
      </div>
      <p class="loading-percent" id="loadingPercent">0%</p>
      <p class="loading-hint">命运的齿轮开始转动...</p>
    </div>

    <!-- 报告页 -->
    <div class="page result-page" id="resultPage">
      <div class="result-bg" id="resultBg"></div>
      <div class="result-icon" id="resultIcon">🌸</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-subtitle" id="resultSubtitle"></p>
      <div class="result-summary-card">
        <p class="result-summary" id="resultSummary"></p>
      </div>
      <div class="result-card" id="resultCard"></div>
      <p class="result-footer" id="resultFooter"></p>
      <button type="button" class="retry-btn" onclick="retryQuiz()">重新测试</button>
    </div>

    <!-- 管理员页面 -->
    <div class="page admin-page" id="adminPage">
      <h2 class="admin-title">🔐 口令管理中心</h2>

      <!-- 统计概览 -->
      <div class="admin-card">
        <p class="admin-card-title">📊 口令库存概览</p>
        <div class="stats-grid">
          <div class="stats-item">
            <div class="stats-label">总口令</div>
            <div class="stats-value stats-total" id="statTotal">0</div>
          </div>
          <div class="stats-item">
            <div class="stats-label">已使用</div>
            <div class="stats-value stats-used" id="statUsed">0</div>
          </div>

    const cardStyles = {

      ],
      wise: [

        { bg: ['#e8f5e9', '#dcedc8'], accent: '#66bb6a', emoji: '🔬' },

    // ============================================
    // 状态
    // ============================================
    let currentQ = 0;
    let score = 0;
    let currentResult = null;
    let currentStyleIndex = 0;
    let currentPassword = ''; // 当前测试使用的口令

    // ============================================
    // 初始化
    // ============================================
    window.addEventListener('DOMContentLoaded', async () => {
      createStars();
      initPasswords();
      // 异步从后端加载共享口令数据
      await loadSharedPasswords();
    });

    function createStars() {
      const field = document.getElementById('starField');
      if (!field) return;
      for (let i = 0; i < 40; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        const size = 1 + Math.random() * 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        field.appendChild(star);
      }
    }

    // ============================================
    // 页面导航
    // ============================================
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    // ============================================
    // 口令管理 - 本地存储
    // ============================================
    function initPasswords() {
      const all = localStorage.getItem(PASSWORD_CONFIG.allPasswordsKey);
      const used = localStorage.getItem(PASSWORD_CONFIG.usedPasswordsKey);
      if (all) PASSWORD_CONFIG.validPasswords = JSON.parse(all);
      if (used) PASSWORD_CONFIG.usedPasswords = JSON.parse(used);
    }

    function savePasswords() {
      localStorage.setItem(PASSWORD_CONFIG.allPasswordsKey, JSON.stringify(PASSWORD_CONFIG.validPasswords));
      localStorage.setItem(PASSWORD_CONFIG.usedPasswordsKey, JSON.stringify(PASSWORD_CONFIG.usedPasswords));
    }

    function getUsedPasswords() {
      // 优先使用内存中的共享数据（从服务器同步的）
      if (PASSWORD_CONFIG.usedPasswords && PASSWORD_CONFIG.usedPasswords.length > 0) {
        return PASSWORD_CONFIG.usedPasswords;
      }
      try {
        const used = localStorage.getItem(PASSWORD_CONFIG.usedPasswordsKey);
        return used ? JSON.parse(used) : [];
      } catch {
        return [];
      }
    }

    // ============================================
    // 口令管理 - API (多设备共享)
    // ============================================
    async function loadSharedPasswords() {
      try {
        const res = await fetch(`${API_BASE}/api/passwords`);
        const data = await res.json();
        PASSWORD_CONFIG.validPasswords = data.validPasswords || [];
        PASSWORD_CONFIG.usedPasswords = data.usedPasswords || [];
        updateAdminStats();
        console.log('✅ 已加载共享口令数据');
      } catch (e) {
        // 服务器请求失败时，保留本地已有数据，避免统计归零
        console.warn('⚠️ 加载共享数据失败，使用本地数据:', e);
      }
    }

    async function validatePassword(password) {
      if (!PASSWORD_CONFIG.enablePasswordCheck) {
        return { valid: true, message: '' };
      }

      const pwd = password.trim();

      // 完全依赖服务器验证（多设备共享的核心）
      try {
        const res = await fetch(`${API_BASE}/api/validate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        const data = await res.json();

        // 服务器验证通过后，更新本地缓存
        if (data.valid) {
          if (!PASSWORD_CONFIG.usedPasswords.includes(pwd)) {
            PASSWORD_CONFIG.usedPasswords.push(pwd);
          }
        }
        return data;
      } catch (e) {
        console.error('⚠️ 服务器验证失败:', e);
        alert('服务器连接失败，请检查网络后重试');
        return { valid: false, message: '服务器连接失败' };
      }
    }

    async function markPasswordAsUsed(password) {
      if (!PASSWORD_CONFIG.enablePasswordCheck) return;

      const pwd = password.trim();

      // 更新本地
      const used = getUsedPasswords();
      if (!used.includes(pwd)) {
        used.push(pwd);
        localStorage.setItem(PASSWORD_CONFIG.usedPasswordsKey, JSON.stringify(used));
        PASSWORD_CONFIG.usedPasswords = used;
      }

      // 同步到API
      try {
        await fetch(`${API_BASE}/api/passwords`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'markUsed', password: pwd })
        });
      } catch (e) {
        console.warn('⚠️ 同步到后端失败:', e);
      }
    }

    // ============================================
    // 管理员功能
    // ============================================
    async function enterAdmin() {
      const pwd = prompt('请输入管理员密码：');
      if (pwd === ADMIN_PASSWORD) {
        await loadSharedPasswords();
        showPage('adminPage');
      } else if (pwd !== null) {
        alert('密码错误');
      }
    }

    function updateAdminStats() {
      const all = PASSWORD_CONFIG.validPasswords;
      const used = getUsedPasswords();

      document.getElementById('statTotal').textContent = all.length;
      document.getElementById('statUsed').textContent = used.length;
      document.getElementById('statRemaining').textContent = Math.max(0, all.length - used.length);

      updatePasswordList();
    }

    function updatePasswordList() {
      const all = PASSWORD_CONFIG.validPasswords;
      const used = getUsedPasswords();
      const listEl = document.getElementById('passwordList');

      if (all.length === 0) {
        listEl.innerHTML = '<div class="empty-state">暂无口令</div>';
        return;
      }

      // 未使用的排前面
      const sorted = [...all].sort((a, b) => used.includes(a) - used.includes(b));

      listEl.innerHTML = sorted.map(pwd => {
        const isUsed = used.includes(pwd);
        return `
          <div class="password-item ${isUsed ? 'used' : ''}" onclick="copyPassword('${pwd}')">
            <span>${pwd}</span>
            <span class="status ${isUsed ? 'used' : 'unused'}">${isUsed ? '已用' : '未用'}</span>
          </div>
        `;
      }).join('');
    }

    function copyPassword(pwd) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(pwd).then(() => {
          showToast('已复制：' + pwd);
        }).catch(() => {
          fallbackCopy(pwd);
        });
      } else {
        fallbackCopy(pwd);
      }
    }

    function fallbackCopy(pwd) {
      const ta = document.createElement('textarea');
      ta.value = pwd;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('已复制：' + pwd);
    }

    function batchGenerate(count) {
      if (count <= 0 || count > 1000) {
        alert('请输入1-1000之间的数字');
        return;
      }

      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      const newPasswords = [];

      for (let i = 0; i < count; i++) {
        let newPwd;
        do {
          newPwd = Array.from({ length: 16 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        } while (PASSWORD_CONFIG.validPasswords.includes(newPwd) || newPasswords.includes(newPwd));
        newPasswords.push(newPwd);
      }

      PASSWORD_CONFIG.validPasswords.push(...newPasswords);
      savePasswords();
      syncToAPI({ action: 'batchGenerate', newPasswords });
      updateAdminStats();
      alert(`成功生成 ${newPasswords.length} 个口令！`);
    }

    function batchGenerateCustom() {
      const input = document.getElementById('customGenCount');
      const count = parseInt(input.value) || 0;

      if (count > 0 && count <= 1000) {
        batchGenerate(count);
        input.value = '';
      } else {
        alert('请输入1-1000之间的数字');
      }
    }

    function exportUnused() {
      const used = getUsedPasswords();
      const unused = PASSWORD_CONFIG.validPasswords.filter(p => !used.includes(p));

      if (unused.length === 0) {
        alert('没有未使用的口令');
        return;
      }

      downloadTxt(unused.join('\n'), '未使用口令.txt');
    }

    function exportAll() {
      if (PASSWORD_CONFIG.validPasswords.length === 0) {
        alert('没有口令可导出');
        return;
      }

      downloadTxt(PASSWORD_CONFIG.validPasswords.join('\n'), '全部口令.txt');
    }

    function downloadTxt(content, filename) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importPasswords(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const lines = e.target.result.split(/\r?\n/)
          .map(l => l.trim())
          .filter(l => l);

        let added = 0;
        lines.forEach(pwd => {
          if (!PASSWORD_CONFIG.validPasswords.includes(pwd)) {
            PASSWORD_CONFIG.validPasswords.push(pwd);
            added++;
          }
        });

        savePasswords();
        syncToAPI({ action: 'batchGenerate', newPasswords: lines });
        updateAdminStats();
        alert(`成功导入 ${added} 个新口令（去重后）`);
      };

      reader.readAsText(file);
      event.target.value = '';
    }

    function addNewPassword() {
      const input = document.getElementById('newPasswordInput');
      const newPwd = input.value.trim();

      if (!newPwd) {
        alert('请输入口令');
        return;
      }

      if (PASSWORD_CONFIG.validPasswords.includes(newPwd)) {
        alert('该口令已存在');
        return;
      }

      PASSWORD_CONFIG.validPasswords.push(newPwd);
      savePasswords();
      syncToAPI({ action: 'batchGenerate', newPasswords: [newPwd] });
      updateAdminStats();
      alert('添加成功！');
      input.value = '';
    }

    function resetUsedPasswords() {
      if (!confirm('确定要清空所有已使用记录吗？所有口令将恢复可用状态。')) return;

      PASSWORD_CONFIG.usedPasswords = [];
      localStorage.removeItem(PASSWORD_CONFIG.usedPasswordsKey);
      syncToAPI({ action: 'resetUsed' });
      updateAdminStats();
      alert('已清空使用记录');
    }

    function clearAllPasswords() {
      if (!confirm('确定要清空所有口令吗？此操作不可恢复！')) return;

      PASSWORD_CONFIG.validPasswords = [];
      PASSWORD_CONFIG.usedPasswords = [];
      localStorage.removeItem(PASSWORD_CONFIG.allPasswordsKey);
      localStorage.removeItem(PASSWORD_CONFIG.usedPasswordsKey);
      syncToAPI({ action: 'clearAll' });
      updateAdminStats();
      alert('已清空全部口令');
    }

    async function syncToAPI(data) {
      try {
        await fetch(`${API_BASE}/api/passwords`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.warn('⚠️ 同步到API失败:', e);
      }
    }

    // ============================================
    // 答题流程
    // ============================================
    async function startQuiz() {
      // 防止重复点击
      const btn = document.getElementById('startBtn');
      if (btn.disabled) return;
      btn.disabled = true;

      try {
        if (PASSWORD_CONFIG.enablePasswordCheck) {
          const passwordInput = document.getElementById('passwordInput');
          const password = passwordInput.value.trim();

          if (!password) {
            passwordInput.classList.add('error');
            setTimeout(() => passwordInput.classList.remove('error'), 500);
            alert('请输入访问口令');
            return;
          }

          const validation = await validatePassword(password);

          if (!validation.valid) {
            passwordInput.classList.add('error');
            setTimeout(() => passwordInput.classList.remove('error'), 500);
            alert(validation.message);
            return;
          }
        }

        currentQ = 0;
        score = 0;
        currentResult = null;
        currentPassword = PASSWORD_CONFIG.enablePasswordCheck ? document.getElementById('passwordInput').value.trim() : '';
        showPage('quizPage');
        renderQuestion();
      } finally {
        btn.disabled = false;
      }
    }

    function renderQuestion() {
      const q = questions[currentQ];

      document.getElementById('questionNum').textContent = currentQ + 1;
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('currentQuestion').textContent = currentQ + 1;
      document.getElementById('progressFill').style.width = ((currentQ + 1) / 18 * 100) + '%';

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => selectOption(idx);
        btn.style.opacity = '0';
        btn.style.transform = 'translateX(12px)';
        container.appendChild(btn);

        setTimeout(() => {
          btn.style.opacity = '1';
          btn.style.transform = 'translateX(0)';
        }, idx * 50);
      });
    }

    function selectOption(point) {
      score += point;

      const options = document.querySelectorAll('.option');
      options.forEach((opt, idx) => {
        opt.style.pointerEvents = 'none';
        if (idx === point) {
          opt.classList.add('selected');
        } else {
          opt.classList.add('unselected');
        }
      });

      setTimeout(() => {
        currentQ++;
        if (currentQ < questions.length) {
          renderQuestion();
        } else {
          showLoading();
        }
      }, 500);
    }

    function showLoading() {
      showPage('loadingPage');

      const loadingText = document.getElementById('loadingText');
      const loadingProgress = document.getElementById('loadingProgress');
      const loadingPercent = document.getElementById('loadingPercent');

      const texts = [
        '正在连接命运之线...',
        '正在解读灵魂密码...',
        '正在推演你的人生轨迹...',
        '正在编织命运的丝线...',
        '命运的答案即将揭晓...'
      ];

      let progress = 0;
      let textIndex = 0;

      const interval = setInterval(() => {
        progress += Math.random() * 8 + 2;
        if (progress > 100) progress = 100;

        loadingProgress.style.width = progress + '%';
        loadingPercent.textContent = Math.round(progress) + '%';

        if (progress > (textIndex + 1) * 20 && textIndex < texts.length - 1) {
          textIndex++;
          loadingText.textContent = texts[textIndex];
        }

        if (progress >= 100) {
          clearInterval(interval);
          setTimeout(() => showResult(), 500);
        }
      }, 100);
