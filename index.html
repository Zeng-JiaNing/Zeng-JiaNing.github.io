<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>20年后的你</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

 :root {
 --warm-orange: #f4a460;
 --milk-tea: #d4a574;
 --star-gold: #d4af37;
 }

 body {
 font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
 background: linear-gradient(135deg, #2d1f3d 0%, #1a1a2e 40%, #16213e 100%);
 min-height: 100vh;
 color: #e8e0d5;
 position: relative;
 overflow-x: hidden;
 }

 /* 背景装饰 - 柔和光晕 */
 body::before {
 content: '';
 position: fixed;
 top: -50%;
 left: -50%;
 width: 200%;
 height: 200%;
 background: radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
 radial-gradient(circle at 70% 80%, rgba(244, 164, 96, 0.03) 0%, transparent 50%);
 pointer-events: none;
 z-index: 0;
 }

 .container {
 max-width: 480px;
 margin: 0 auto;
 padding: 20px;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 justify-content: center;
 }

 .page { display: none; opacity: 0; }
 .page.active { display: block; animation: pageIn 0.4s ease forwards; }

 @keyframes pageIn {
 from { opacity: 0; transform: translateY(15px); }
 to { opacity: 1; transform: translateY(0); }
 }

 /* 首页 */
 .home-page { text-align: center; padding: 40px 20px; }
 .star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
 .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s ease-in-out infinite; }

 @keyframes twinkle {
 0%, 100% { opacity: 0.3; }
 50% { opacity: 1; }
 }

 .home-content { position: relative; z-index: 1; }
 .sacred-symbol { font-size: 40px; margin-bottom: 20px; animation: symbolReveal 1s ease forwards; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }
 @keyframes symbolReveal {
 0% { opacity: 0; transform: scale(0.5) rotate(-90deg); }
 100% { opacity: 1; transform: scale(1) rotate(0deg); }
 }

 .home-title { font-size: 32px; font-weight: 300; color: #f5f0e8; margin-bottom: 12px; letter-spacing: 6px; animation: titleIn 0.8s ease forwards 0.3s; opacity: 0; text-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
 @keyframes titleIn {
 0% { opacity: 0; transform: translateY(20px); }
 100% { opacity: 1; transform: translateY(0); }
 }

 .home-subtitle { font-size: 14px; color: #b8a89a; letter-spacing: 3px; margin-bottom: 30px; animation: fadeIn 0.6s ease forwards 0.5s; opacity: 0; }
 @keyframes fadeIn { to { opacity: 1; } }

 .home-divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--star-gold), transparent); margin: 0 auto 25px; animation: expandLine 0.8s ease forwards 0.6s; opacity: 0; }
 @keyframes expandLine { 0% { width: 0; opacity: 0; } 100% { width: 50px; opacity: 1; } }

 .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 35px; animation: fadeIn 0.6s ease forwards 0.7s; opacity: 0; }
 .tag { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); padding: 6px 14px; border-radius: 20px; font-size: 11px; color: var(--star-gold); letter-spacing: 1px; }

 .enter-btn { position: relative; background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(244, 164, 96, 0.2)); color: #f5f0e8; border: 1px solid rgba(212, 175, 55, 0.4); padding: 16px 45px; font-size: 15px; border-radius: 50px; cursor: pointer; letter-spacing: 2px; overflow: hidden; animation: fadeIn 0.6s ease forwards 0.9s; opacity: 0; transition: all 0.3s ease; }
 .enter-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.25), transparent); transition: left 0.5s ease; }
 .enter-btn:hover::before { left: 100%; }
 .enter-btn:hover { border-color: var(--star-gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.25); }
 .enter-btn:active { transform: scale(0.97); }

 .home-note { margin-top: 20px; font-size: 12px; color: #9a8a7a; letter-spacing: 1px; animation: fadeIn 0.6s ease forwards 1.1s; opacity: 0; }

 .social-proof {
 margin-bottom: 35px;
 animation: fadeIn 0.6s ease forwards 1s;
 opacity: 0;
 }

 .people-count {
 display: block;
 font-size: 13px;
 color: #ffb74d;
 margin-bottom: 8px;
 letter-spacing: 1px;
 }

 .recent-join {
 font-size: 11px;
 color: rgba(255, 255, 255, 0.5);
 letter-spacing: 0.5px;
 }

 .password-section {
 margin-bottom: 30px;
 animation: fadeIn 0.6s ease forwards 1.1s;
 opacity: 0;
 }

 .password-label {
 font-size: 12px;
 color: #9a8a7a;
 margin-bottom: 10px;
 letter-spacing: 1px;
 }

 .password-input {
 width: 100%;
 max-width: 280px;
 margin: 0 auto;
 display: block;
 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(212, 175, 55, 0.3);
 border-radius: 20px;
 padding: 12px 20px;
 font-size: 14px;
 color: #f5f0e8;
 text-align: center;
 letter-spacing: 2px;
 outline: none;
 transition: all 0.3s ease;
 }

 .password-input::placeholder {
 color: rgba(255, 255, 255, 0.3);
 letter-spacing: 1px;
 }

 .password-input:focus {
 border-color: var(--star-gold);
 background: rgba(255, 255, 255, 0.08);
 box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
 }

 .password-input.error {
 border-color: #e57373;
 animation: shake 0.5s ease;
 }

 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-8px); }
 75% { transform: translateX(8px); }
 }

 .password-hint {
 font-size: 10px;
 color: rgba(255, 255, 255, 0.4);
 margin-top: 8px;
 letter-spacing: 0.5px;
 }

 /* 答题页 */
 .quiz-page { padding: 20px; position: relative; z-index: 1; }
 .progress-bar { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
 .progress-fill { height: 100%; background: linear-gradient(90deg, var(--star-gold), var(--warm-orange)); border-radius: 2px; transition: width 0.4s ease; }
 .progress-text { font-size: 11px; color: rgba(255, 255, 255, 0.5); text-align: right; margin-bottom: 25px; letter-spacing: 1px; }
 .question-number { font-size: 12px; color: var(--star-gold); margin-bottom: 12px; letter-spacing: 2px; transition: opacity 0.2s ease; }
 .question-text { font-size: 20px; color: #f5f0e8; line-height: 1.7; margin-bottom: 25px; transition: opacity 0.2s ease, transform 0.2s ease; }

 .options { display: flex; flex-direction: column; gap: 12px; transition: opacity 0.2s ease, transform 0.2s ease; }

 /* 过渡动画类 */
 .fade-out {
 opacity: 0 !important;
 transform: translateY(-12px) !important;
 transition: opacity 0.2s ease, transform 0.2s ease !important;
 }

 .fade-in {
 animation: questionIn 0.25s ease forwards;
 }

 @keyframes questionIn {
 from {
 opacity: 0;
 transform: translateY(20px);
 }
 to {
 opacity: 1;
 transform: translateY(0);
 }
 }

 /* 关键修复：确保选项始终可见 */
 .option {
 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 padding: 16px 18px;
 border-radius: 12px;
 cursor: pointer;
 text-align: left;
 font-size: 15px;
 color: #c8c0b5;
 opacity: 1;
 transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s, opacity 0.3s;
 }

 .option:hover {
 background: rgba(212, 175, 55, 0.15);
 border-color: rgba(212, 175, 55, 0.4);
 color: #f5f0e8;
 transform: translateX(4px);
 }

 .option.selected {
 background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(244, 164, 96, 0.15));
 border-color: var(--star-gold);
 color: #f5f0e8;
 opacity: 1 !important;
 transform: scale(1.02);
 }

 .option.unselected {
 opacity: 0.25 !important;
 pointer-events: none;
 }

 /* 加载页 */
 .loading-page { text-align: center; padding: 40px 20px; }
 .loading-icon { font-size: 50px; margin-bottom: 25px; animation: pulse 2s ease-in-out infinite; }
 @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
 .loading-text { font-size: 15px; color: #b8a89a; margin-bottom: 25px; letter-spacing: 2px; animation: blink 1.5s ease-in-out infinite; }
 @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
 .loading-bar { width: 180px; height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin: 0 auto 12px; overflow: hidden; }
 .loading-progress { height: 100%; background: linear-gradient(90deg, var(--star-gold), var(--warm-orange)); border-radius: 2px; transition: width 0.3s ease; }
 .loading-percent { font-size: 22px; color: var(--star-gold); font-weight: 300; }
 .loading-hint { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-top: 25px; letter-spacing: 1px; }

 /* 报告页 */
 .result-page { padding: 25px 20px; text-align: center; }
 .result-icon { font-size: 60px; margin-bottom: 18px; animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.35)); }
 @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 60% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
 .result-title { font-size: 24px; color: #f5f0e8; margin-bottom: 8px; font-weight: 400; letter-spacing: 3px; }
 .result-subtitle { font-size: 13px; color: #8a7a6a; margin-bottom: 20px; letter-spacing: 2px; }

 .result-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 24px 20px; text-align: left; margin-bottom: 18px; }
 .result-section { margin-bottom: 20px; }
 .result-section:last-child { margin-bottom: 0; }
 .section-title { font-size: 14px; color: var(--star-gold); margin-bottom: 8px; font-weight: 600; }
 .section-content { font-size: 13px; color: #9a8a7a; line-height: 1.8; }
 .result-footer { font-size: 12px; color: #6a5a4a; line-height: 1.7; margin-top: 18px; font-style: italic; }

 .retry-btn {
 width: 100%;
 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 padding: 12px 20px;
 border-radius: 20px;
 font-size: 14px;
 color: #9a8a7a;
 cursor: pointer;
 transition: all 0.3s ease;
 letter-spacing: 1px;
 margin-top: 25px;
 }

 .retry-btn:hover {
 background: rgba(255, 255, 255, 0.1);

 }
 .admin-entry {

 border-radius: 50%;

 cursor: pointer;
 opacity: 1;
 transition: all 0.3s ease;

 }
 .admin-entry:hover {
 background: rgba(244, 164, 96, 0.95);
 transform: scale(1.1);
 }
 .admin-entry:hover {
 opacity: 0.8;
 background: rgba(212, 175, 55, 0.2);
 border-color: rgba(212, 175, 55, 0.4);
 }
.admin-entry {

 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 border-radius: 50%;

 justify-content: center;
 cursor: pointer;

 width: 40px;

 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 border-radius: 50%;
 display: flex;

 width: 40px;

 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 border-radius: 50%;
 display: flex;
 align-items: center;

 cursor: pointer;
 opacity: 0.3;

 border-color: rgba(212, 175, 55, 0.4);
 }
</style>

</head>
<body>
<div class="admin-entry" onclick="enterAdmin()" title="管理员入口">🔒</div>
 <div class="star-field" id="starField"></div>
 <div class="container">
 <!-- 首页 -->
 <div class="page home-page active" id="homePage">
 <div class="home-content">
 <div class="sacred-symbol">✧</div>
 <h1 class="home-title">20年后的你</h1>
 <p class="home-subtitle">一份只属于你的人生推演报告</p>
 <div class="home-divider"></div>
 <div class="tags-container">
 <span class="tag">18道题</span>
 <span class="tag">4分钟</span>
 <span class="tag">千人千面</span>
 <span class="tag">专属推演</span>
 </div>
 <div class="social-proof">
 <span class="people-count">🔥 已有 12,853 人参与</span>
 <span class="recent-join">3秒前有人刚刚完成</span>
 </div>
 <div class="password-section">
 <p class="password-label">🔐 请输入专属访问口令</p>
 <input type="text" class="password-input" id="passwordInput" placeholder="输入口令" maxlength="20" autocomplete="off">
 <p class="password-hint">每个口令仅限使用一次</p>
 </div>
 <button class="enter-btn" onclick="startQuiz()">解锁人生剧本</button>
 <p class="home-note">✨ 准备好遇见未来的自己了吗？</p>
 </div>
 </div>

 <!-- 答题页 -->
 <div class="page quiz-page" id="quizPage">
 <div class="progress-bar">
 <div class="progress-fill" id="progressFill"></div>
 </div>
 <p class="progress-text"><span id="currentQuestion">1</span> / 18</p>
 <p class="question-number">Q<span id="questionNum">1</span></p>
 <p class="question-text" id="questionText"></p>
 <div class="options" id="optionsContainer"></div>
 </div>

 <!-- 加载页 -->
 <div class="page loading-page" id="loadingPage">
 <div class="loading-icon">✧</div>
 <p class="loading-text" id="loadingText">正在连接命运之线...</p>
 <div class="loading-bar">
 <div class="loading-progress" id="loadingProgress"></div>
 </div>
 <p class="loading-percent" id="loadingPercent">0%</p>
 <p class="loading-hint">命运的齿轮开始转动...</p>
 </div>

 <!-- 报告页 -->
 <div class="page result-page" id="resultPage">
 <div class="result-icon" id="resultIcon">🌸</div>
 <h2 class="result-title" id="resultTitle"></h2>
 <p class="result-subtitle" id="resultSubtitle"></p>
 <div class="result-card" id="resultCard"></div>
 <p class="result-footer" id="resultFooter"></p>
 <button class="retry-btn" onclick="retryQuiz()">重新测试</button>
 </div>
 </div>

 <!-- 管理员面板 -->
 <div class="page admin-page" id="adminPage" style="padding: 25px 20px; max-height: 100vh; overflow-y: auto;">
 <h2 style="text-align: center; color: #f5f0e8; margin-bottom: 25px; letter-spacing: 3px;">🔐 口令管理中心</h2>

 <!-- 统计概览 -->
 <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
 <p style="font-size: 12px; color: #8a7a6a; margin-bottom: 12px; letter-spacing: 1px;">📊 口令库存概览</p>
 <div class="stats-grid"><div class="stats-item"><div class="stats-label">总口令</div><div class="stats-value stats-total" id="statTotal">0</div></div><div class="stats-item"><div class="stats-label">已使用</div><div class="stats-value stats-used" id="statUsed">0</div></div><div class="stats-item"><div class="stats-label">剩余</div><div class="stats-value stats-remaining" id="statRemaining">0</div></div></div>
 </div>

 <!-- 批量生成 -->
 <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
 <p style="font-size: 12px; color: #8a7a6a; margin-bottom: 15px; letter-spacing: 1px;">🪄 批量生成口令</p>
 <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;">
 <div dmin-entry" onclick="enterAdmin()" title="管理员入口">🔒</div>

 <div admin-entry" onclick="enterAdmin()" title="管理员入口">🔒</div>

 <div admin-entry" onclick="enterAdmin()" title="管理员入口">🔒</div>

 <button onclick="batchGenerate(10)" style="background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 8px 16px; color: #f5f0e8; font-size: 13px; cursor: pointer;">生成10个</button>
 <button onclick="batchGenerate(50)" style="background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 8px 16px; color: #f5f0e8; font-size: 13px; cursor: pointer;">生成50个</button>
 <button onclick="batchGenerate(100)" style="background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 8px 16px; color: #f5f0e8; font-size: 13px; cursor: pointer;">生成100个</button>
 <button onclick="batchGenerate(200)" style="background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 8px 16px; color: #f5f0e8; font-size: 13px; cursor: pointer;">生成200个</button>
 </div>
 <div style="display: flex; gap: 8px; margin-bottom: 8px;">
 <input type="number" id="customGenCount" placeholder="自定义数量" min="1" max="1000"
 style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 12px; color: #f5f0e8; font-size: 13px; outline: none; width: 60px;">
 <button onclick="batchGenerate(parseInt(document.getElementById('customGenCount').value)||0)" style="background: linear-gradient(135deg, var(--star-gold), var(--warm-orange)); border: none; border-radius: 10px; padding: 8px 16px; color: #1a1a2e; font-size: 13px; font-weight: 600; cursor: pointer;">生成</button>
 </div>
 </div>

 <!-- 导入导出 -->
 <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
 <p style="font-size: 12px; color: #8a7a6a; margin-bottom: 15px; letter-spacing: 1px;">📦 导入 / 导出</p>
 <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;">
 <button onclick="exportUnused()" style="flex: 1; min-width: 120px; background: rgba(244,164,96,0.2); border: 1px solid rgba(244,164,96,0.3); border-radius: 10px; padding: 10px; color: #f5f0e8; font-size: 13px; cursor: pointer;">📥 导出未使用口令</button>
 <button onclick="exportAll()" style="flex: 1; min-width: 120px; background: rgba(244,164,96,0.2); border: 1px solid rgba(244,164,96,0.3); border-radius: 10px; padding: 10px; color: #f5f0e8; font-size: 13px; cursor: pointer;">📥 导出全部口令</button>

 <button onclick="addNewPassword()" style="background: linear-gradient(135deg, var(--star-gold), var(--warm-orange)); border: none; border-radius: 10px; padding: 10px 20px; color: #1a1a2e; font-size: 13px; font-weight: 600; cursor: pointer;">添加</button>
 </div>

 function renderQuestion() {
 const q = questions[currentQ];
 document.getElementById('questionNum').textContent = currentQ + 1;
 document.getElementById('questionText').textContent = q.question;
 document.getElementById('currentQuestion').textContent = currentQ + 1;
 document.getElementById('progressFill').style.width = ((currentQ) / 18 * 100) + '%';

 const container = document.getElementById('optionsContainer');
 container.innerHTML = '';
 container.classList.remove('fade-out');
 container.classList.add('fade-in');

 const questionNumber = document.querySelector('.question-number');
 const questionText = document.querySelector('.question-text');
 questionNumber.classList.remove('fade-out');
 questionNumber.classList.add('fade-in');
 questionText.classList.remove('fade-out');
 questionText.classList.add('fade-in');

 q.options.forEach((opt, idx) => {
 const btn = document.createElement('div');
 btn.className = 'option';
 btn.textContent = opt;
 btn.onclick = () => selectOption(idx);
 btn.style.opacity = '0';
 btn.style.transform = 'translateX(12px)';
 container.appendChild(btn);
 setTimeout(() => {
 btn.style.opacity = '1';
 btn.style.transform = 'translateX(0)';
 }, idx * 50);
 });

 setTimeout(() => {
 container.classList.remove('fade-in');
 questionNumber.classList.remove('fade-in');
 questionText.classList.remove('fade-in');
 }, 250);
 }

 function selectOption(point) {
 score += point;

 const options = document.querySelectorAll('.option');
 const questionNumber = document.querySelector('.question-number');
 const questionText = document.querySelector('.question-text');
 const optionsContainer = document.querySelector('.options');

 options.forEach((opt, idx) => {
 opt.style.pointerEvents = 'none';
 if (idx === point) {
 opt.classList.add('selected');
 } else {
 opt.classList.add('unselected');
 }
 });

 questionNumber.classList.add('fade-out');
 questionText.classList.add('fade-out');
 optionsContainer.classList.add('fade-out');

 setTimeout(() => {
 currentQ++;
 if (currentQ < questions.length) {
 renderQuestion();
 } else {
 showLoading();
 }
 }, 500);
 }

 function showLoading() {

 const loadingText = document.getElementById('loadingText');

 const loadingPercent = document.getElementById('loadingPercent');

 const texts = [
 '正在连接命运之线...',

 '正在编织命运的丝线...',

 ];

 let progress = 0;
 let textIndex = 0;

 const interval = setInterval(() => {
 progress += Math.random() * 8 + 2;

 loadingProgress.style.width = progress + '%';
 loadingPercent.textContent = Math.round(progress) + '%';

 if (progress > textIndex * 20 && textIndex < texts.length - 1) {
 textIndex++;

 if (progress >= 100) {

 setTimeout(() => showResult(), 500);
 }
 }, 100);
 }
